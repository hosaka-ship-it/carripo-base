<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>納得度比較シート | CARRIPO BASE</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --co:#FF6B4A;--cd:#CC4A28;--ye:#FFD93D;--yd:#CC9F00;
  --mi:#4ECBA8;--md:#2E9A7A;--bl:#4D96FF;--pu:#A78BFA;
  --cr:#FFF8F0;--ink:#2D2415;--ink2:#7A6553;--ink3:#B8A99A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"M PLUS Rounded 1c",sans-serif;background:var(--cr);color:var(--ink);min-height:100vh}
#app{max-width:440px;margin:0 auto;padding:0 0 80px}
.hd{background:var(--co);padding:14px 18px;position:sticky;top:0;z-index:10;border-bottom:3px solid var(--cd);font-size:16px;font-weight:800;color:#fff}
.stp{display:flex;gap:5px;padding:8px 18px;background:var(--co);border-bottom:3px solid var(--cd)}
.sp{height:6px;flex:1;border-radius:3px;background:rgba(255,255,255,.3)}
.sp.dn{background:rgba(255,255,255,.6)}.sp.ac{background:#fff}
.sec{padding:20px 16px 0}
.ttl{font-size:20px;font-weight:800;margin-bottom:14px}
.em{color:var(--co)}
.card{background:#fff;border:2px solid var(--ink);border-radius:24px;padding:16px 18px;margin-bottom:12px;box-shadow:4px 4px 0 var(--ink)}
.card.co{border-color:var(--co);box-shadow:4px 4px 0 var(--cd)}
.card.mi{border-color:var(--mi);box-shadow:4px 4px 0 var(--md)}
.card.ye{border-color:var(--ye);box-shadow:4px 4px 0 var(--yd)}
.card.pu{border-color:var(--pu);box-shadow:4px 4px 0 #7C5CE8}
.clbl{font-size:10px;font-weight:800;color:var(--ink2);letter-spacing:.1em;margin-bottom:8px}
input[type=text],input[type=number],input[type=date],textarea{
  width:100%;background:var(--cr);border:2px solid var(--ink3);border-radius:12px;
  padding:10px 14px;font-size:15px;font-weight:500;color:var(--ink);
  font-family:inherit;outline:none;-webkit-appearance:none;
}
input:focus,textarea:focus{border-color:var(--co)}
textarea{resize:none;line-height:1.6}
.btn{
  width:100%;padding:14px;background:var(--co);color:#fff;
  border:2px solid var(--ink);border-radius:12px;font-size:15px;
  font-weight:800;cursor:pointer;box-shadow:0 4px 0 var(--cd);
  font-family:inherit;transition:transform .1s,box-shadow .1s;
}
.btn:active{transform:translateY(4px);box-shadow:none}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.gbtn{
  padding:11px 16px;background:#fff;color:var(--ink2);
  border:2px solid var(--ink3);border-radius:12px;
  font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
}
.crow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cnum{
  width:28px;height:28px;border-radius:50%;border:2px solid var(--ink3);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:var(--ink2);flex-shrink:0;transition:all .2s;
}
.cnum.on{border-color:var(--co);background:var(--co);color:#fff}
.gbut{
  padding:10px 18px;background:#fff;border:2px solid var(--ink3);
  border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;
  color:var(--ink);font-family:inherit;box-shadow:3px 3px 0 var(--ink3);
}
.gbut.on{background:var(--co);color:#fff;border-color:var(--co);box-shadow:3px 3px 0 var(--cd)}
.axcard{
  background:#fff;border:2px solid var(--ink3);border-radius:24px;
  padding:14px 16px;margin-bottom:10px;cursor:pointer;
  box-shadow:3px 3px 0 var(--ink3);display:flex;
  align-items:center;justify-content:space-between;
}
.axcard.on{border-color:var(--co);box-shadow:3px 3px 0 var(--co);background:linear-gradient(135deg,#FFF0EA,#FFF8F4)}
.ck{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--ink3);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ck.on{background:var(--co);border-color:var(--co)}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab{
  padding:8px 16px;border:2px solid var(--ink3);border-radius:50px;
  font-size:13px;font-weight:700;cursor:pointer;background:#fff;
  color:var(--ink2);font-family:inherit;box-shadow:2px 2px 0 var(--ink3);
}
.tab.on{background:var(--co);color:#fff;border-color:var(--co);box-shadow:2px 2px 0 var(--cd)}
.sts{display:flex;gap:3px;margin-top:7px}
.st{font-size:30px;cursor:pointer;user-select:none;line-height:1;color:#ddd}
.st.on{color:#FFD93D}
.sts.sm .st{font-size:22px}
.bdg{display:inline-flex;font-size:10px;font-weight:800;padding:3px 9px;border-radius:50px;border:1.5px solid}
.bco{background:#FFF0EA;color:var(--co);border-color:var(--co)}
.bmi{background:#E8F9F4;color:#2A8A6A;border-color:var(--mi)}
.alrt{padding:12px 16px;border-radius:18px;font-size:13px;font-weight:600;line-height:1.65;margin-bottom:10px;border:2px solid}
.aw{background:#FFF9E0;color:#8A6000;border-color:var(--ye);box-shadow:3px 3px 0 var(--yd)}
.ao{background:#E8F9F4;color:#1A6A4A;border-color:var(--mi);box-shadow:3px 3px 0 var(--md)}
.are{background:#FFF0EA;color:#CC3A18;border-color:var(--co);box-shadow:3px 3px 0 var(--cd)}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.ditem{background:var(--cr);border:2px solid var(--ink3);border-radius:12px;padding:10px 12px}
.dval{font-size:17px;font-weight:800}
.dlbl{font-size:11px;color:var(--ink2);margin-top:1px;font-weight:600}
.mcrd{border:2px solid var(--co);border-radius:24px;padding:16px 18px;margin-bottom:12px;box-shadow:4px 4px 0 var(--cd);background:linear-gradient(135deg,#FFF0EA,#FFF8F4)}
.mlbl{font-size:10px;font-weight:800;color:var(--co);letter-spacing:.1em;margin-bottom:8px}
.mtxt{font-size:14px;color:var(--ink);line-height:1.85;font-weight:600}
.scgrid{display:grid;gap:8px;margin-bottom:14px}
.scc{background:#fff;border:2px solid var(--ink3);border-radius:24px;padding:14px 16px;box-shadow:3px 3px 0 var(--ink3)}
.scc.top{border-color:var(--co);box-shadow:4px 4px 0 var(--cd);background:linear-gradient(135deg,#FFF0EA,#fff)}
.scn{font-size:12px;color:var(--ink2);font-weight:700;margin-bottom:4px}
.scv{font-size:28px;font-weight:800;line-height:1}
.sy{color:var(--ye)}
.sctop{font-size:10px;font-weight:800;color:var(--co);margin-bottom:3px}
.scgut{font-size:11px;color:var(--co);font-weight:700;margin-top:4px}
.nav{display:flex;gap:8px;margin-top:20px;padding:0 16px 16px}
.nav .btn{flex:1}
.sep{height:2px;background:repeating-linear-gradient(90deg,var(--ink3) 0,var(--ink3) 6px,transparent 6px,transparent 12px);margin:16px 0}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,.15);border-top-color:var(--co);border-radius:50%;animation:sr .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sr{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"></div>
<script>

// ========== データ定義 ==========
var AX = [
  {k:"future", l:"未来軸",   d:"3年後の自分を好きになれる？", ic:"🚀"},
  {k:"comfy",  l:"居心地軸", d:"素の自分でいられる？",        ic:"🏡"},
  {k:"apt",    l:"適性軸",   d:"得意で無双できる？",          ic:"⚡"},
  {k:"skill",  l:"スキル軸", d:"一生モノの武器が手に入る？",  ic:"🔑"},
  {k:"gut",    l:"本音軸",   d:"直感のザワつきはない？",      ic:"🫀"}
];
var QQ = {
  future: ["名刺を出す自分にワクワクする？","3年後の先輩のようになりたい？"],
  comfy:  ["面接で背伸びせず話せた？","そのオフィスで息苦しくない？"],
  apt:    ["人より楽にこなせそう？","自分の強みが会社の課題にマッチ？"],
  skill:  ["3年後も他で通用するスキルがつく？","レアな体験ができそう？"],
  gut:    ["内定メールで「ここだ」って思った？","周りじゃなく自分で選んでる？"]
};
var COL = ["#FF6B4A","#4ECBA8","#4D96FF"];
var RANG = [0,1,2,3,4].map(function(i){ return (i*72-90)*Math.PI/180; });

// ========== 状態 ==========
var S = makeState();

function makeState() {
  return {
    step: 0, ci: 0,
    co: [
      {name:"",ax:{},px:{},memo:"",data:null,loading:false,err:false},
      {name:"",ax:{},px:{},memo:"",data:null,loading:false,err:false},
      {name:"",ax:{},px:{},memo:"",data:null,loading:false,err:false}
    ],
    gut: "", pri: [], dl: "", mc: "", ml: false
  };
}

function getActive() {
  return S.co.filter(function(c){ return c.name.trim() !== ""; });
}

function getAxisScore(c, k) {
  return ((c.ax[k+"1"] || 0) + (c.ax[k+"2"] || 0)) / 2;
}

function getTotalScore(c) {
  var t = 0, m = 0;
  for (var i = 0; i < AX.length; i++) {
    var a = AX[i];
    var v = getAxisScore(c, a.k);
    var w = (S.pri.indexOf(a.k) > -1) ? 1.5 : 1;
    t += v * w;
    m += 5 * w;
  }
  return (t / m) * 5;
}

// ========== 星ボタン ==========
function makeStars(val, fnName, small) {
  var cls = small ? "sts sm" : "sts";
  var id = fnName.replace(/[()]/g, "");
  var h = '<div class="' + cls + '" id="stars_' + id + '">';
  for (var v = 1; v <= 5; v++) {
    var on = val >= v ? " on" : "";
    h += '<span class="st' + on + '" onclick="' + fnName + '(' + v + ')">★</span>';
  }
  h += '</div>';
  return h;
}

// ========== ステッパー ==========
function makeStepper(active) {
  var h = '<div class="stp">';
  for (var i = 0; i < 4; i++) {
    var cls = i < active ? " dn" : (i === active ? " ac" : "");
    h += '<div class="sp' + cls + '"></div>';
  }
  h += '</div>';
  return h;
}

// ========== レーダーチャート ==========
function makeRadar(cos) {
  var cx = 150, cy = 140, r = 85, lr = 108;

  function pt(v, i) {
    var rv = (v / 5) * r;
    return [cx + rv * Math.cos(RANG[i]), cy + rv * Math.sin(RANG[i])];
  }

  var g = "";
  for (var lv = 1; lv <= 5; lv++) {
    var pts = AX.map(function(_, i){ return pt(lv, i).join(","); }).join(" ");
    var fill = lv === 5 ? "rgba(255,107,74,.05)" : "none";
    var stroke = lv === 5 ? "rgba(255,107,74,.2)" : "rgba(0,0,0,.07)";
    var sw = lv === 5 ? "1.5" : ".8";
    g += '<polygon points="' + pts + '" fill="' + fill + '" stroke="' + stroke + '" stroke-width="' + sw + '"/>';
  }

  for (var i = 0; i < AX.length; i++) {
    var p2 = pt(5, i);
    g += '<line x1="' + cx + '" y1="' + cy + '" x2="' + p2[0] + '" y2="' + p2[1] + '" stroke="rgba(0,0,0,.07)" stroke-width=".8"/>';
  }

  var anc = ["middle","start","start","end","end"];
  for (var i = 0; i < AX.length; i++) {
    var lx = cx + lr * Math.cos(RANG[i]);
    var ly = cy + lr * Math.sin(RANG[i]);
    g += '<text x="' + lx + '" y="' + (ly+5) + '" text-anchor="' + anc[i] + '" font-size="10" fill="var(--ink2)" font-weight="700">' + AX[i].l + '</text>';
  }

  for (var ci = 0; ci < cos.length; ci++) {
    var c = cos[ci];
    var pts2 = AX.map(function(a, i){ return pt(getAxisScore(c, a.k), i).join(","); }).join(" ");
    g += '<polygon points="' + pts2 + '" fill="' + COL[ci] + '33" stroke="' + COL[ci] + '" stroke-width="2.5"/>';
    for (var i = 0; i < AX.length; i++) {
      var pp = pt(getAxisScore(c, AX[i].k), i);
      g += '<circle cx="' + pp[0] + '" cy="' + pp[1] + '" r="4" fill="' + COL[ci] + '" stroke="#fff" stroke-width="2"/>';
    }
  }

  var leg = "";
  for (var i = 0; i < cos.length; i++) {
    leg += '<rect x="' + (8+i*110) + '" y="268" width="10" height="10" rx="3" fill="' + COL[i] + '"/>';
    leg += '<text x="' + (22+i*110) + '" y="278" font-size="11" fill="var(--ink2)" font-weight="700">' + cos[i].name + '</text>';
  }

  return '<div class="card" style="padding:14px 8px 10px"><svg width="100%" viewBox="0 0 300 290">' + g + leg + '</svg></div>';
}


// 星を即時更新（再描画なし）
function updateStars(id, val) {
  var el = document.getElementById("stars_" + id);
  if (!el) return;
  var spans = el.querySelectorAll(".st");
  for (var i = 0; i < spans.length; i++) {
    if (i < val) {
      spans[i].className = "st on";
    } else {
      spans[i].className = "st";
    }
  }
}

// ========== メインレンダラー ==========
function render() {
  if (S.step === 0) renderS0();
  else if (S.step === 1) renderS1();
  else if (S.step === 2) renderS2();
  else renderS4();
}

// ========== STEP 0 ==========
function renderS0() {
  var cos = getActive();

  var gwHTML = "";
  if (cos.length > 0) {
    for (var i = 0; i < cos.length; i++) {
      var c = cos[i];
      var onCls = S.gut === c.name ? " on" : "";
      gwHTML += '<button class="gbut' + onCls + '" onclick="selectGut(this)">' + c.name + '</button>';
    }
  } else {
    gwHTML = '<span style="font-size:13px;color:var(--ink2);font-weight:600">↑ まず会社名を入力してね</span>';
  }

  var btnDisabled = (cos.length > 0 && S.gut !== "") ? "" : " disabled";

  var coRows = "";
  for (var i = 0; i < 3; i++) {
    var dotOn = S.co[i].name ? " on" : "";
    var ph = i === 0 ? "会社名を入力（必須）" : (i === 1 ? "2社目（任意）" : "3社目（任意）");
    coRows += '<div class="crow">';
    coRows += '<div class="cnum' + dotOn + '" id="dot' + i + '">' + (i+1) + '</div>';
    coRows += '<input type="text" id="inp' + i + '" placeholder="' + ph + '" value="' + S.co[i].name + '" style="flex:1" oninput="onCoInput(' + i + ', this.value)">';
    coRows += '</div>';
  }

  var html = "";
  html += '<div class="hd" style="display:flex;align-items:center;gap:8px"><img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAA4KCw0LCQ4NDA0QDw4RFiQXFhQUFiwgIRokNC43NjMuMjI6QVNGOj1OPjIySGJJTlZYXV5dOEVmbWVabFNbXVn/2wBDAQ8QEBYTFioXFypZOzI7WVlZWVlZWVlZWVlZWVlZWVlZWVlZWVlZWVlZWVlZWVlZWVlZWVlZWVlZWVlZWVlZWVn/wAARCAB4AHgDASIAAhEBAxEB/8QAGwABAQACAwEAAAAAAAAAAAAAAAEDBQIEBwb/xAAuEAACAQMDAgQGAQUAAAAAAAAAAQIDBBEFEjEhQQYTUWEUFSJxgbFCJjNSYpH/xAAYAQEBAQEBAAAAAAAAAAAAAAAAAgMBBP/EABoRAQEBAQEBAQAAAAAAAAAAAAABAhEDMTL/2gAMAwEAAhEDEQA/APRe4DZADATY5AAAAAAHI7gAAB+wBck4HAHJAiYAjC6sdx9gHVDuGAH2ASHsAQKAIBJxistpL1bwMppNNNMBnAAYDsMj9AAAAAAAMAAXH/QO5hvJSja1JRbTS5X3Dsnbxyr1lQp75RlJekVk1lXVKsulKKgvXlile1qfTduXpIzOpaXH96lsl/kiLevRnEx+p1rZ1Z1ZZqScn7s3tmmrSlno9pxt7a2glKnGMv8AZvJ2DuZxPr6TU5IEKTuUwAByAAAAD8gBwMYAAoaUk01lPo0ain4l0apqCsoahRlcOWxR64cvRS4b/J3HqlktTWm/ERV44eZ5WHnb+gONTTqcutOTg/TlHVnaVqf8dy9Y9SXXifRbO8naXN/TpV4PbKMoy6P3eMHK98SaPp9wqF3f06dRxU0tsmsPh5SwTcxrn11GKEpQlmLcX7G4oSc6MJS6trqdGeoaZVq0abr05zr0nWpuOXuguWmjDp3iPRb+vC1sr6nUqtfTDDi39spZEnDe5qfG3IzUy8T6NG/+CeoUVX3bMddu703Yxn8m3fBTJB2AAdgAA6AMYYDuY7mk61tWpRlslUhKKkv45WMmTuP2B8foK1DTbSz0qt4ec5W1R7rhSj5eMv64vly68GrnpPiKVy9eVpRVz8V8QqLb8/Yvp8v0xtPRfcvsB57qeka3XuvEFa0hKFvdSp5oypJzrwxh7W+GjLfaPq61C6qaRGdCitNp0oKtSUnUwsbMviRtbh6xT8Uzq04Xc7GNSL2Rf0Sh5XVLLxnd7Zydb+o3ptxTuIXMa0qkK0JUZRk8PO6nlNNJNLjqs9wMVnpFejd6O6FpcwoUdPq05+alujOWej922Tw94Zv52el1NSufKhZqUqVsqKjOEnnrKWevqd/Tlq3z+EryF5C3dOGIue6EX5a3JtPD+rPXHJ9OB56tN1SHhqfhv5LvqubSvN0fKa3Z3t85x0xz+j72hTdK3pU5Sc3CCi5PvhYyZSAAAAAwAHcB8juAA9wAAC9wKMk7ACjkjABsDsEAA74ADtgBAA+SFfIAhchMgBcgoAmepcck5KAAY/IAcdAhkCZKAAQKAIwAAwMZ6gATuAAKAAGAAAAAAAAXkAAf/9k=" style="width:26px;height:26px;border-radius:50%;object-fit:contain;background:#fff;padding:1px;flex-shrink:0"/>CARRIPO BASE</div>';
  html += makeStepper(0);
  html += '<div class="sec">';
  html += '<div class="ttl">まず、<span class="em">直感</span>で答えて。</div>';
  html += '<div class="card">';
  html += '<div class="clbl">比較したい会社（最大3社）</div>';
  html += coRows;
  html += '</div>';
  html += '<div class="sep"></div>';
  html += '<div class="clbl">今この瞬間、直感の1位は？</div>';
  html += '<div id="gw" style="display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 20px">' + gwHTML + '</div>';
  html += '<div class="sep"></div>';
  html += '<div class="clbl">内定承諾期限（任意）</div>';
  html += '<input type="date" id="dl" value="' + S.dl + '" oninput="S.dl=this.value" style="margin-top:8px">';
  html += '</div>';
  html += '<div class="nav"><button class="btn" id="btnNext0" onclick="goStep1()"' + btnDisabled + '>次へ：価値観を選ぶ →</button></div>';

  document.getElementById("app").innerHTML = html;
}

function onCoInput(idx, val) {
  S.co[idx].name = val.trim();
  var dot = document.getElementById("dot" + idx);
  if (dot) dot.className = "cnum" + (S.co[idx].name ? " on" : "");
  refreshGW();
  var btn = document.getElementById("btnNext0");
  if (btn) btn.disabled = !(getActive().length > 0 && S.gut !== "");
  schedFetch(idx);
}

function refreshGW() {
  var w = document.getElementById("gw");
  if (!w) return;
  var cos = getActive();
  var html = "";
  if (cos.length > 0) {
    for (var i = 0; i < cos.length; i++) {
      var c = cos[i];
      var onCls = S.gut === c.name ? " on" : "";
      html += '<button class="gbut' + onCls + '" onclick="selectGut(this)">' + c.name + '</button>';
    }
  } else {
    html = '<span style="font-size:13px;color:var(--ink2);font-weight:600">↑ まず会社名を入力してね</span>';
  }
  w.innerHTML = html;
}

function selectGut(el) {
  S.gut = el.textContent;
  refreshGW();
  var btn = document.getElementById("btnNext0");
  if (btn) btn.disabled = !(getActive().length > 0 && S.gut !== "");
}

function goStep1() {
  var named = S.co.filter(function(c){ return c.name.trim() !== ""; });
  // compactにする
  S.co[0] = named[0] || {name:"",ax:{},px:{},memo:"",data:null,loading:false,err:false};
  S.co[1] = named[1] || {name:"",ax:{},px:{},memo:"",data:null,loading:false,err:false};
  S.co[2] = named[2] || {name:"",ax:{},px:{},memo:"",data:null,loading:false,err:false};
  for (var i = 0; i < named.length; i++) {
    if (!S.co[i].data && !S.co[i].loading) doFetchCo(i);
  }
  S.step = 1;
  render();
}

// ========== STEP 1 ==========
function renderS1() {
  var cnt = S.pri.length;
  var cntColor = cnt === 3 ? "var(--co)" : "var(--ink2)";

  var axHTML = "";
  for (var i = 0; i < AX.length; i++) {
    var a = AX[i];
    var on = S.pri.indexOf(a.k) > -1;
    var onCls = on ? " on" : "";
    var checkContent = on ? '<svg width="11" height="9" viewBox="0 0 11 9"><path d="M1 4.5L4 7.5L10 1" stroke="#fff" stroke-width="2" fill="none"/></svg>' : "";
    var badge = on ? '<div class="bdg bco" style="margin-top:6px">×1.5 優先軸</div>' : "";
    axHTML += '<div class="axcard' + onCls + '" onclick="togglePri(\'' + a.k + '\')">';
    axHTML += '<div>';
    axHTML += '<div style="font-size:15px;font-weight:800;margin-bottom:3px">' + a.ic + ' ' + a.l + '</div>';
    axHTML += '<div style="font-size:12px;color:var(--ink2);font-weight:600">' + a.d + '</div>';
    axHTML += badge;
    axHTML += '</div>';
    axHTML += '<div class="ck' + onCls + '">' + checkContent + '</div>';
    axHTML += '</div>';
  }

  var html = "";
  html += '<div class="hd">価値観の重み設定 <span style="font-size:13px;font-weight:800;color:' + cntColor + '">' + cnt + '/3</span></div>';
  html += makeStepper(1);
  html += '<div class="sec">';
  html += '<div class="ttl">何を<span class="em">大事</span>にしたい？</div>';
  html += '<div style="font-size:13px;color:var(--ink2);margin-bottom:18px;font-weight:500">3つ選んでね。選んだ軸に <strong>1.5倍</strong> の重みがかかるよ✨</div>';
  html += axHTML;
  html += '</div>';
  html += '<div class="nav"><button class="gbtn" onclick="S.step=0;render()">← 戻る</button><button class="btn" onclick="S.step=2;S.ci=0;render()"' + (cnt !== 3 ? " disabled" : "") + '>次へ：各社を評価する →</button></div>';

  document.getElementById("app").innerHTML = html;
}

function togglePri(k) {
  var i = S.pri.indexOf(k);
  if (i > -1) {
    S.pri.splice(i, 1);
  } else if (S.pri.length < 3) {
    S.pri.push(k);
  }
  renderS1();
}

// ========== STEP 2 ==========
function renderS2() {
  var cos = getActive();
  var c = cos[S.ci];
  if (!c) { S.step = 4; render(); return; }

  var ok = true;
  for (var i = 0; i < AX.length; i++) {
    var a = AX[i];
    if (!c.ax[a.k+"1"] || !c.ax[a.k+"2"]) { ok = false; break; }
  }
  var last = (S.ci === cos.length - 1);

  var tabsHTML = "";
  for (var i = 0; i < cos.length; i++) {
    var onCls = i === S.ci ? " on" : "";
    tabsHTML += '<button class="tab' + onCls + '" onclick="S.ci=' + i + ';S.step=2;render()">' + cos[i].name + '</button>';
  }

  var axCardsHTML = "";
  for (var i = 0; i < AX.length; i++) {
    var a = AX[i];
    var hasPri = S.pri.indexOf(a.k) > -1;
    var cardCls = hasPri ? " co" : "";
    var badge = hasPri ? '<div class="bdg bco">×1.5 優先軸</div>' : "";
    axCardsHTML += '<div class="card' + cardCls + '">';
    axCardsHTML += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
    axCardsHTML += '<span style="font-size:18px">' + a.ic + '</span>';
    axCardsHTML += '<strong>' + a.l + '</strong>' + badge;
    axCardsHTML += '</div>';
    axCardsHTML += '<div style="margin-bottom:14px">';
    axCardsHTML += '<div style="font-size:13px;color:var(--ink2);font-weight:600;margin-bottom:2px">Q1. ' + QQ[a.k][0] + '</div>';
    axCardsHTML += makeStars(c.ax[a.k+"1"] || 0, "setAx_" + a.k + "_1");
    axCardsHTML += '</div>';
    axCardsHTML += '<div>';
    axCardsHTML += '<div style="font-size:13px;color:var(--ink2);font-weight:600;margin-bottom:2px">Q2. ' + QQ[a.k][1] + '</div>';
    axCardsHTML += makeStars(c.ax[a.k+"2"] || 0, "setAx_" + a.k + "_2");
    axCardsHTML += '</div>';
    axCardsHTML += '</div>';
  }

  var pxHTML = "";
  for (var i = 0; i < AX.length; i++) {
    var a = AX[i];
    pxHTML += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
    pxHTML += '<span style="font-size:13px;color:var(--ink2);font-weight:700">' + a.ic + ' ' + a.l + '</span>';
    pxHTML += makeStars(c.px[a.k] || 0, "setPx_" + a.k, true);
    pxHTML += '</div>';
  }

  var nextBtn = last
    ? '<button class="btn" id="btnNext2" onclick="S.step=4;render()"' + (ok ? "" : " disabled") + '>レポートを見る 🎉</button>'
    : '<button class="btn" id="btnNext2" onclick="S.ci++;S.step=2;render()"' + (ok ? "" : " disabled") + '>次の会社へ →</button>';

  var html = "";
  html += '<div class="hd">' + c.name + ' を評価</div>';
  html += makeStepper(2);
  html += '<div class="sec">';
  html += '<div class="tabs">' + tabsHTML + '</div>';
  html += '<div class="card mi"><div class="clbl">📊 企業情報（web検索済み）</div>' + makeDataCard(c) + '</div>';
  html += axCardsHTML;
  html += '<div class="card ye"><div style="font-size:13px;font-weight:800;margin-bottom:4px">👨‍👩‍👧 親フィルター（任意）</div>';
  html += '<div style="font-size:12px;color:var(--ink2);font-weight:600;margin-bottom:14px">「親ならどう評価する？」後でズレを確認するよ。</div>';
  html += pxHTML + '</div>';
  html += '<div class="card"><div style="font-size:13px;font-weight:800;margin-bottom:6px">📝 モヤモヤメモ（任意）</div>';
  html += '<textarea id="memoInput" placeholder="数値にできない違和感を書いとこう..." rows="3">' + c.memo + '</textarea></div>';
  html += '</div>';
  html += '<div class="nav"><button class="gbtn" onclick="goBackS2()">← 戻る</button>' + nextBtn + '</div>';

  document.getElementById("app").innerHTML = html;

  var memoEl = document.getElementById("memoInput");
  if (memoEl) {
    memoEl.oninput = function() {
      S.co[S.ci].memo = this.value;
    };
  }

  for (var i = 0; i < AX.length; i++) {
    (function(aKey) {
      window["setAx_" + aKey + "_1"] = function(val) {
        S.co[S.ci].ax[aKey+"1"] = val;
        updateStars("ax_" + aKey + "_1", val);
        var b = document.getElementById("btnNext2");
        if (b) {
          var ok = true;
          for (var j = 0; j < AX.length; j++) {
            if (!S.co[S.ci].ax[AX[j].k+"1"] || !S.co[S.ci].ax[AX[j].k+"2"]) { ok = false; break; }
          }
          b.disabled = !ok;
        }
      };
      window["setAx_" + aKey + "_2"] = function(val) {
        S.co[S.ci].ax[aKey+"2"] = val;
        updateStars("ax_" + aKey + "_2", val);
        var b = document.getElementById("btnNext2");
        if (b) {
          var ok = true;
          for (var j = 0; j < AX.length; j++) {
            if (!S.co[S.ci].ax[AX[j].k+"1"] || !S.co[S.ci].ax[AX[j].k+"2"]) { ok = false; break; }
          }
          b.disabled = !ok;
        }
      };
      window["setPx_" + aKey] = function(val) {
        S.co[S.ci].px[aKey] = val;
        updateStars("setPx_" + aKey, val);
      };
    })(AX[i].k);
  }
}

function goBackS2() {
  if (S.ci > 0) { S.ci--; render(); }
  else { S.step = 1; render(); }
}

// ========== STEP 4 レポート ==========
function renderS4() {
  var cos = getActive();
  var sc = cos.map(function(c){ return getTotalScore(c); });
  var mx = Math.max.apply(null, sc);
  var best = cos[sc.indexOf(mx)];
  var gm = best.name === S.gut;
  var dl = S.dl ? Math.ceil((new Date(S.dl) - new Date()) / 86400000) : null;

  var alts = [];
  for (var i = 0; i < cos.length; i++) {
    var c = cos[i];
    if ((getAxisScore(c,"future") + getAxisScore(c,"skill")) / 2 > 3.5 && getAxisScore(c,"gut") < 2) {
      alts.push(c.name + "：条件系は高いのに本音軸が低い。頭で選ぼうとしてない？🤔");
    }
    var mt = 0, pt = 0;
    for (var j = 0; j < AX.length; j++) {
      mt += getAxisScore(c, AX[j].k);
      pt += (c.px[AX[j].k] || 0);
    }
    if (pt > 0 && Math.abs(mt - pt) > 5) {
      alts.push(c.name + "：あなたと親の評価にズレがある。誰のための就活か確認してみて👀");
    }
  }

  var scCards = "";
  for (var i = 0; i < cos.length; i++) {
    var sv = (Math.round(sc[i]*10)/10).toFixed(1);
    var ib = sc[i] === mx;
    scCards += '<div class="scc' + (ib ? " top" : "") + '">';
    scCards += '<div class="sctop">' + (ib ? "🏆 TOP" : "　") + '</div>';
    scCards += '<div class="scn">' + cos[i].name + '</div>';
    scCards += '<div class="scv"><span class="sy">★</span>' + sv + '</div>';
    scCards += cos[i].name === S.gut ? '<div class="scgut">直感の1位</div>' : "";
    scCards += '</div>';

var fetchTimers = {};

function schedFetch(idx) {
  clearTimeout(fetchTimers[idx]);
  if (S.co[idx].name.trim().length < 2) return;
  fetchTimers[idx] = setTimeout(function(){ doFetchCo(idx); }, 1200);
}

async function doFetchCo(idx) {
  var name = S.co[idx].name.trim();
  if (!name) return;
  S.co[idx].loading = true;
  S.co[idx].data = null;
  S.co[idx].err = false;
  if (S.step === 2) renderS2();

  var p = "あなたは就活支援の専門家です。以下の企業について複数の信頼できる情報源（企業公式サイト・日本経済新聞・Bloomberg・IR情報・OpenWork・Vorkers・就活会議など）をweb検索で調査し、以下のJSON形式のみで返してください。説明文・コードブロック不要。\n企業名：" + name + "\n{"
    + "\"avg_salary\": 平均年収万円(数値/不明はnull),"
    + "\"avg_overtime\": 月平均残業h(数値/不明はnull),"
    + "\"turnover_rate\": 離職率%(数値/不明はnull),"
    + "\"employees\": 従業員数人(数値/不明はnull),"
    + "\"strengths_summary\": \"強みの概要50字以内\"," 
    + "\"strengths_detail\": \"具体的な強み・競争優位性・事例やデータ200字以内\"," 
    + "\"strengths_source\": \"情報源（公式IR・日経・Bloomberg等）\"," 
    + "\"weaknesses_summary\": \"課題・弱みの概要50字以内\"," 
    + "\"weaknesses_detail\": \"具体的な課題・口コミ情報も含む200字以内\"," 
    + "\"weaknesses_source\": \"情報源（OpenWork・就活会議等）\"," 
    + "\"jobseeker_summary\": \"就職前に知るべき重要情報の概要50字以内\"," 
    + "\"jobseeker_detail\": \"企業文化・将来性・最近の動向・口コミ200字以内\"," 
    + "\"jobseeker_source\": \"情報源\"," 
    + "\"axis_match\": {\"future\":1-5整数,\"comfy\":1-5整数,\"apt\":1-5整数,\"skill\":1-5整数,\"gut\":1-5整数},"
    + "\"axis_match_reason\": \"各軸マッチ度の根拠100字以内\"" 
    + "}\nJSONのみ。口コミは個人の主観的意見である旨を含める。矛盾情報は信頼性高い方を優先。";

  try {
    var r = await fetch("/.netlify/functions/claude-proxy", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        tools: [{type: "web_search_20250305", name: "web_search"}],
        messages: [{role: "user", content: p}]
      })
    });
    var d = await r.json();
    var txt = (d.content || []).filter(function(b){ return b.type === "text"; }).map(function(b){ return b.text; }).join("") || "";
    S.co[idx].data = JSON.parse(txt.replace(/```json|```/g, "").trim());
  } catch(e) {
    S.co[idx].err = true;
  }
  S.co[idx].loading = false;
  if (S.step === 2) renderS2();
}

  if (c.loading) {
    return '<div style="text-align:center;padding:14px 0">'
      + '<span class="spin"></span>'
      + '<div style="font-size:13px;color:var(--ink2);font-weight:600;margin-top:6px">企業情報をweb検索中...</div>'
      + '<div style="font-size:11px;color:var(--ink3);margin-top:3px">公式サイト・IR・口コミを照合しています</div>'
      + '</div>';
  }
  if (!c.data || c.err) {
    return '<div style="font-size:12px;color:var(--ink2);padding:4px 0;font-weight:600">データが取得できなかったよ。</div>';
  }
  var d = c.data;
  function fmt(v, u) { return v != null ? v + u : "—"; }

  var basicHTML = '<div class="bdg bmi" style="margin-bottom:10px">✓ 複数情報源から取得済み</div>'
    + '<div class="dgrid" style="margin-bottom:12px">'
    + '<div class="ditem"><div class="dval">' + fmt(d.avg_salary, "万円") + '</div><div class="dlbl">💰 平均年収</div></div>'
    + '<div class="ditem"><div class="dval">' + fmt(d.avg_overtime, "h/月") + '</div><div class="dlbl">⏰ 平均残業</div></div>'
    + '<div class="ditem"><div class="dval">' + fmt(d.turnover_rate, "%") + '</div><div class="dlbl">🚪 離職率</div></div>'
    + '<div class="ditem"><div class="dval">' + (d.employees != null ? Number(d.employees).toLocaleString() + "人" : "—") + '</div><div class="dlbl">👥 従業員数</div></div>'
    + '</div>';

  var axMatchHTML = "";
  if (d.axis_match) {
    var axNames = {future:"🚀未来",comfy:"🏡居心地",apt:"⚡適性",skill:"🔑スキル",gut:"🫀本音"};
    var axKeys = ["future","comfy","apt","skill","gut"];
    axMatchHTML = '<div style="margin-bottom:12px;padding:10px 12px;background:#F0FFF8;border-radius:12px;border:1.5px solid var(--mi)">'
      + '<div style="font-size:11px;font-weight:800;color:var(--md);letter-spacing:.06em;margin-bottom:8px">📊 あなたの優先軸とのマッチ度</div>'
      + '<div style="display:grid;grid-template-columns:auto 1fr;gap:4px 8px;align-items:center">';
    for (var j = 0; j < axKeys.length; j++) {
      var k = axKeys[j];
      var v = (d.axis_match && d.axis_match[k]) ? d.axis_match[k] : 0;
      var isPri = S.pri.indexOf(k) > -1;
      var color = v >= 4 ? "#4ECBA8" : v >= 3 ? "#FFD93D" : "#FF6B4A";
      var stars = "";
      for (var s = 1; s <= 5; s++) stars += '<span style="color:' + (s <= v ? color : "#ddd") + ';font-size:14px">★</span>';
      axMatchHTML += '<div style="font-size:12px;font-weight:' + (isPri ? "800" : "600") + ';color:' + (isPri ? "var(--co)" : "var(--ink2)") + '">' + axNames[k] + (isPri ? ' <span style="font-size:10px">(優先)</span>' : "") + '</div>';
      axMatchHTML += '<div>' + stars + '</div>';
    }
    axMatchHTML += '</div>';
    if (d.axis_match_reason) {
      axMatchHTML += '<div style="font-size:11px;color:var(--ink2);margin-top:8px;line-height:1.65;border-top:1px solid var(--mi);padding-top:6px">' + d.axis_match_reason + '</div>';
    }
    axMatchHTML += '</div>';
  }

  function infoBlock(emoji, title, summary, detail, source) {
    if (!summary && !detail) return "";
    return '<div style="margin-bottom:10px;padding:10px 12px;background:var(--cr);border-radius:12px;border:1.5px solid var(--ink3)">'
      + '<div style="font-size:11px;font-weight:800;color:var(--ink2);margin-bottom:5px">' + emoji + " " + title + '</div>'
      + (summary ? '<div style="font-size:13px;font-weight:700;color:var(--ink);margin-bottom:5px">' + summary + '</div>' : "")
      + (detail ? '<div style="font-size:12px;color:var(--ink2);line-height:1.7;margin-bottom:5px">' + detail + '</div>' : "")
      + (source ? '<div style="font-size:10px;color:var(--ink3);font-weight:600">出典：' + source + '</div>' : "")
      + '</div>';
  }

  return basicHTML
    + axMatchHTML
    + infoBlock("💪", "企業の強み", d.strengths_summary, d.strengths_detail, d.strengths_source)
    + infoBlock("⚠️", "課題・弱み", d.weaknesses_summary, d.weaknesses_detail, d.weaknesses_source)
    + infoBlock("📌", "就職前に知っておくべきこと", d.jobseeker_summary, d.jobseeker_detail, d.jobseeker_source)
    + '<div style="font-size:10px;color:var(--ink3);margin-top:4px;line-height:1.5">※口コミは個人の主観的意見です。最新情報は公式サイト等でご確認ください。</div>';
}

// ========== むぎchanコメント ==========
async function fetchMugi() {
  S.ml = true;
  render();
  var cos = getActive();
  var sc = cos.map(function(c){ return getTotalScore(c); });
  var best = cos[sc.indexOf(Math.max.apply(null, sc))];
  var priL = S.pri.map(function(k){
    var a = AX.filter(function(a){ return a.k === k; })[0];
    return a ? a.l : "";
  }).join("、");
  var gm = best.name === S.gut;
  var prompt = "あなたはむぎchan。23歳社会人2年目福岡出身東京在住。就活苦戦経験あり。博多弁が混じる誠実な先輩スタイル。\n";
  for (var i = 0; i < cos.length; i++) {
    var c = cos[i];
    prompt += c.name + " ★" + sc[i].toFixed(1) + " ";
    for (var j = 0; j < AX.length; j++) {
      prompt += AX[j].l + ":" + getAxisScore(c, AX[j].k).toFixed(1) + " ";
    }
    prompt += "\n";
  }
  prompt += "優先:" + priL + " 直感:" + S.gut + " 計算:" + best.name + " 一致:" + (gm ? "YES" : "NO") + "\n";
  prompt += "先輩の一言+データ根拠200文字以内。伴走スタンスで。";
  try {
    var r = await fetch("/.netlify/functions/claude-proxy", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 400,
        messages: [{role:"user", content:prompt}]
      })
    });
    var d = await r.json();
    S.mc = (d.content && d.content[0] && d.content[0].text) ? d.content[0].text : "ごめんね、取得できなかったよ。";
  } catch(e) {
    S.mc = "エラー: " + e.message;
  }
  S.ml = false;
  render();
}

// ========== 起動 ==========
render();

</script>
